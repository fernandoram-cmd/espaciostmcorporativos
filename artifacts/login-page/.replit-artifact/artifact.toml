kind = "web"
previewPath = "/"
title = "Espacios Corporativos - Login"
version = "1.0.0"
id = "artifacts/login-page"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20368

[services.development]
run = "pnpm --filter @workspace/login-page run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/login-page", "run", "build" ]
publicDir = "artifacts/login-page/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20368"
BASE_PATH = "/"
